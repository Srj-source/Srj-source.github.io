
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 · simple pause</title>
  <!-- simple, elegant fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    /* MINIMAL — only classes used in your rearranged HTML */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #faf7f2;  /* soft cream */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
      color: #2e241e;
      line-height: 1.5;
      text-align: center;
    }

    /* subtle background pattern (kept — adds simple texture) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(#e9ddd2 0.8px, transparent 0.8px);
      background-size: 28px 28px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    /* all content sits above pattern */
    .code-number,
    .badge,
    h1,
    .god-quote,
    .footer-note {
      position: relative;
      z-index: 2;
      max-width: 580px;
    }

    /* error code — 503 */
    .code-number {
      font-size: 5.8rem;
      font-weight: 400;
      font-family: 'Merriweather', serif;
      letter-spacing: 8px;
      color: #3a2a1f;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.02);
      animation: softLanding 0.9s ease-out;
    }

    /* simple entrance animation */
    @keyframes softLanding {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #9b7e64;
      border-bottom: 1.5px solid #dccbbc;
      padding-bottom: 0.6rem;
      margin-bottom: 1.5rem;
      animation: softLanding 0.9s 0.05s ease-out both;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-weight: 400;
      font-size: 2.4rem;
      color: #3f2e22;
      margin: 0.5rem 0 1.5rem;
      letter-spacing: -0.01em;
      animation: softLanding 0.9s 0.1s ease-out both;
    }

    h1 i {
      margin: 0 10px;
      color: #b77f56;
      font-size: 1.8rem;
      opacity: 0.8;
    }

    /* divine quote — simple, noticeable */
    .god-quote {
      margin: 0 auto 2rem;
      max-width: 500px;
      width: 100%;
      font-size: 1.5rem;
      font-family: 'Merriweather', serif;
      font-style: italic;
      color: #4a3729;
      padding: 1rem 1.4rem;
      border-left: 5px solid #c9a87c;
      background: #fdfaf7;
      border-radius: 0 40px 40px 0;
      text-align: left;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      animation: softLanding 0.9s 0.15s ease-out both;
    }

    .god-quote i {
      color: #b5835a;
      margin: 0 5px;
      font-size: 1.3rem;
    }

    .footer-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 0.5rem;
      color: #6f5b4b;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border: 1px solid #ede0d4;
      animation: softLanding 0.9s 0.2s ease-out both;
    }

    .footer-note i {
      color: #b07e58;
    }

    /* mobile adjustments */
    @media (max-width: 480px) {
      .code-number { font-size: 4.2rem; letter-spacing: 4px; }
      h1 { font-size: 1.9rem; }
      h1 i { font-size: 1.5rem; }
      .god-quote { font-size: 1.25rem; padding: 0.8rem 1rem; }
      .footer-note { font-size: 1rem; padding: 0.6rem 1.2rem; }
    }
  </style>
  <!-- Font Awesome for simple icons (kept — only used in existing HTML) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

      <div class="code-number">503</div>

    
    <div class="badge">
      <i class="fas fa-circle" style="font-size: 0.45rem; margin-right: 6px; color: #b1683a;"></i> 
      service unavailable
      <i class="fas fa-circle" style="font-size: 0.45rem; margin-left: 6px; color: #b1683a;"></i>
    </div>
    
    <h1>
      <i class="fas fa-cloud"></i> 
      server down 
      <i class="fas fa-leaf"></i>
    </h1>
    
    <!-- REQUIRED STATEMENT 2: if God exist, I have seen him -->
    <div class="god-quote">
      <i class="fas fa-quote-left"></i> 
      if God exists, I have seen Him.
      <i class="fas fa-quote-right"></i>
      <div style="font-size: 0.85rem; margin-top: 8px; font-style: normal; opacity: 0.8; font-weight: 300;">— मातृ देवो भव । पितृ देवो भव</div>
    </div>

</body>
</html>
