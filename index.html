<script>

(function() {

    const symbols = ['*', '#', '@', '+', '~', '¬®', '¬∑'];   // trail characters

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function randomCommentArt() {
        // Grid size
        const W = 40 + randomInt(0, 30);
        const H = 15 + randomInt(0, 12);

        // Create an empty canvas (2D array)
        const grid = Array.from({ length: H }, () => Array(W).fill(' '));

        // Turtle state
        let x = Math.floor(W / 2);
        let y = Math.floor(H / 2);
        let dir = 0;                // 0‚Üíright, 1‚Üídown, 2‚Üíleft, 3‚Üíup
        const chars = randomChoice(symbols);
        const maxSteps = randomInt(60, 300);
        let steps = 0;

        // Draw a random walk / spiral / zigzag
        while (steps < maxSteps && y >= 0 && y < H && x >= 0 && x < W) {
            grid[y][x] = chars;             // leave tail

            const turn = randomInt(-1, 1);  // -1 left, 0 straight, 1 right (mod 4)
            dir = (dir + turn + 4) % 4;

            const dx = [1, 0, -1, 0][dir];
            const dy = [0, 1, 0, -1][dir];
            const dist = 1 + randomInt(0, 2);   // step forward 1‚ÄĎ3 cells

            for (let i = 0; i < dist; i++) {
                x += dx;
                y += dy;
                if (y < 0 || y >= H || x < 0 || x >= W) break;
                grid[y][x] = chars;
            }
            steps++;
        }

        // Convert grid to string with a decorative border
        const topLine    = '‚ēĒ' + '‚ēź'.repeat(W) + '‚ēó';
        const bottomLine = '‚ēö' + '‚ēź'.repeat(W) + '‚ēĚ';
        const rows = grid.map(row => '‚ēĎ' + row.join('') + '‚ēĎ');
        const heading = '   Random ASCII Turtle Figure   ';
        const offset = Math.floor((W - heading.length) / 2);
        const paddedHeading = ' '.repeat(Math.max(0, offset)) + heading;
        const headerLine = '‚ē†' + '‚ēź'.repeat(W) + '‚ē£';

        const artString = [
            '\n' + topLine,
            '‚ēĎ' + paddedHeading.substring(0, W) + '‚ēĎ',
            headerLine,
            ...rows,
            bottomLine
        ].join('\n');

        return artString;
    }

    // ------- endless injection of hidden comment nodes -------
    function injectHiddenArt() {
        const body = document.body;
        if (!body) return;

        const comment = document.createComment(randomCommentArt());
        // Insert right after the existing contact‚ÄĎus comment if it exists,
        // otherwise simply append to the body.
        const firstComment = document.querySelector('* > comment') ? 
            (function() {
                // find the first comment node inside body (the contact one)
                for (let node of body.childNodes) {
                    if (node.nodeType === Node.COMMENT_NODE && node.textContent.includes('CONTACT US')) {
                        return node;
                    }
                }
                return null;
            })() : null;

        if (firstComment) {
            // Insert after the contact comment
            firstComment.parentNode.insertBefore(comment, firstComment.nextSibling);
        } else {
            body.appendChild(comment);
        }
    }

    // Run once immediately, then continuously every 2‚ÄĎ4 seconds
    injectHiddenArt();
    // Don‚Äôt use setInterval with a fixed time; we want it to feel random.
    function scheduleNext() {
        const delay = 2000 + Math.random() * 2500;   // 2‚ÄĎ4.5 seconds
        setTimeout(() => {
            injectHiddenArt();
            scheduleNext();   // keep going forever
        }, delay);
    }
    scheduleNext();

    
})();
</script>
