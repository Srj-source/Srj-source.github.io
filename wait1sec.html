<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>
</head>
<body>

 

  <script>
    let time = 1;

    const counter = document.getElementById("count");

    const timer = setInterval(() => {
      time--;
      counter.textContent = time;

      if(time <= 0){
        clearInterval(timer);

        // Change URL here
        window.location.href = "https://srj-source.github.io/errorpage.html";
      }
    }, 1000);
  </script>

</body>
</html>
